# Build and publish a Reloaded II mod.
# Based on the Reloaded mod template (by Sewer56), updated for .NET 9 and current action versions.
#
# On push/PR: builds and uploads the packaged mod as workflow artifacts.
# On pushing a tag (e.g. v0.3.0): also creates a GitHub Release with the auto-generated changelog
#   and the packaged mod attached, and pushes to the Reloaded NuGet feed if RELOADED_NUGET_KEY is set.

name: Build and Publish Reloaded Mod

on:
  push:
    branches: [ master, main ]
    tags:
      - '*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

# Needed so the on-tag step can create a GitHub Release with the default GITHUB_TOKEN.
permissions:
  contents: write

env:
  PUBLISH_COMMON_PATH: ./Publish/ToUpload/
  PUBLISH_GAMEBANANA_PATH: ./Publish/ToUpload/GameBanana
  PUBLISH_GITHUB_PATH: ./Publish/ToUpload/Generic
  PUBLISH_NUGET_PATH: ./Publish/ToUpload/NuGet
  PUBLISH_CHANGELOG_PATH: ./Publish/Changelog.md
  PUBLISH_PATH: ./Publish
  RELOADEDIIMODS: .
  # Reloaded.Publisher.exe targets .NET 5; roll it forward onto the .NET 9 runtime we install above.
  DOTNET_ROLL_FORWARD: LatestMajor
  NUGET_URL: http://packages.sewer56.moe:5000/v3/index.json
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: 'recursive'

    - name: Setup .NET SDK (9.0)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup AutoChangelog
      run: npm install -g auto-changelog

    - name: Create Changelog
      run: |
        [System.IO.Directory]::CreateDirectory("$env:PUBLISH_PATH")
        if ($env:IS_RELEASE -eq 'true') {
            auto-changelog --sort-commits date --hide-credit --template changelog-template.hbs --commit-limit false --starting-version "$env:RELEASE_TAG" --output "$env:PUBLISH_CHANGELOG_PATH"
        }
        else {
            auto-changelog --sort-commits date --hide-credit --template changelog-template.hbs --commit-limit false --unreleased --output "$env:PUBLISH_CHANGELOG_PATH"
        }

    - name: Build
      run: ./Publish.ps1 -ChangelogPath "$env:PUBLISH_CHANGELOG_PATH"

    - name: Upload GitHub Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GitHub Release
        path: |
          ${{ env.PUBLISH_GITHUB_PATH }}/*

    - name: Upload GameBanana Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameBanana Release
        path: |
          ${{ env.PUBLISH_GAMEBANANA_PATH }}/*

    - name: Upload NuGet Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NuGet Release
        path: |
          ${{ env.PUBLISH_NUGET_PATH }}/*

    - name: Upload Changelog Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Changelog
        path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        retention-days: 1

    - name: Upload to GitHub Releases (on Tag)
      uses: softprops/action-gh-release@v2
      if: env.IS_RELEASE == 'true'
      with:
        body_path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        files: |
          ${{ env.PUBLISH_GITHUB_PATH }}/*

    - name: Push to NuGet (on Tag)
      env:
        NUGET_KEY: ${{ secrets.RELOADED_NUGET_KEY }}
      if: env.IS_RELEASE == 'true'
      run: |
        if ([string]::IsNullOrEmpty("$env:NUGET_KEY"))
        {
            Write-Host "NuGet Repository Key (GitHub Secrets -> RELOADED_NUGET_KEY) Not Specified. Skipping."
            return
        }

        $items = Get-ChildItem -Path "$env:PUBLISH_NUGET_PATH/*.nupkg"
        Foreach ($item in $items)
        {
            Write-Host "Pushing $item"
            dotnet nuget push "$item" -k "$env:NUGET_KEY" -s "$env:NUGET_URL" --skip-duplicate
        }
